<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsor — takıl</title>
  <meta name="description" content="takıl'daki kampanya sponsorlarını keşfet." />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../takil.css" />

  <style>
    :root {
      --accent:      #FF4B1F;
      --accent-2:    #E8380C;
      --accent-soft: rgba(255, 75, 31, 0.08);
      --accent-mid:  rgba(255, 75, 31, 0.20);
      --lime:        #d7e5bb;
      --lime-soft:   rgba(215, 229, 187, 0.35);
      --ink:         #16140f;
      --page:        #fdfcf9;
      --card:        #ffffff;
      --mono:        'IBM Plex Mono', ui-monospace, monospace;
    }
    body {
      font-family: 'Bricolage Grotesque', -apple-system, sans-serif;
      background: var(--page);
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: calc(var(--nav-h, 60px) + 40px) 20px 110px;
    }

    /* back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #8a857a;
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s ease;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 13px; height: 13px; stroke: currentColor; }

    /* ── Membership-card hero ── */
    .sponsor-card {
      position: relative;
      border: 1px solid #ece9e1;
      border-radius: 26px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 1px 2px rgba(20,18,12,0.03);
      margin-bottom: 40px;
    }
    .sponsor-cover {
      position: relative;
      height: 132px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      display: flex;
      align-items: flex-end;
      padding: 0 28px;
    }
    .sponsor-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.16) 1.5px, transparent 1.5px);
      background-size: 16px 16px;
      opacity: 0.5;
    }
    .sponsor-medallion {
      position: absolute;
      left: 28px;
      bottom: -34px;
      width: 76px; height: 76px;
      border-radius: 50%;
      background: var(--card);
      border: 4px solid var(--card);
      box-shadow: 0 4px 16px rgba(20,18,12,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      z-index: 2;
    }
    .sponsor-medallion img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .sponsor-seam {
      position: relative;
      height: 0;
      border-top: 2px dashed rgba(22,20,15,0.14);
    }
    .seam-notch {
      position: absolute;
      top: -9px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--page);
    }
    .seam-notch.l { left: -9px; }
    .seam-notch.r { right: -9px; }

    .sponsor-info {
      padding: 46px 28px 28px;
    }
    .sponsor-name {
      font-size: clamp(24px, 4.5vw, 30px);
      font-weight: 800;
      letter-spacing: -0.6px;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .sponsor-tag {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: block;
    }
    .sponsor-desc {
      font-size: 14px;
      color: #6b665c;
      line-height: 1.7;
      max-width: 56ch;
      margin-bottom: 22px;
    }
    .sponsor-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sponsor-link-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink);
      background: #fbfaf7;
      border: 1px solid #ece9e1;
      padding: 9px 14px;
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .sponsor-link-chip:hover {
      border-color: var(--accent-mid);
      color: var(--accent);
    }
    .sponsor-link-chip svg {
      width: 13px; height: 13px;
      stroke: currentColor;
    }

    /* stat strip */
    .sponsor-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border-top: 1px solid #ece9e1;
    }
    .sponsor-stat {
      padding: 18px 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sponsor-stat:first-child {
      border-right: 1px solid #ece9e1;
    }
    .sponsor-stat-num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.5px;
    }
    .sponsor-stat-label {
      font-size: 11.5px;
      font-weight: 600;
      color: #a49f92;
    }

    /* section heading */
    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--ink);
    }
    .section-note {
      font-family: var(--mono);
      font-size: 11px;
      color: #a49f92;
    }

    /* reuse of the ticket card, trimmed for this context */
    .campaign-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      margin-bottom: 48px;
    }
    .prize-card {
      position: relative;
      border: 1px solid #ece9e1;
      border-radius: 20px;
      overflow: hidden;
      background: var(--card);
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }
    .prize-card:hover {
      border-color: var(--accent-mid);
      box-shadow: 0 14px 32px -18px rgba(255, 75, 31, 0.35);
      transform: translateY(-2px);
    }
    .prize-reward-band {
      position: relative;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      padding: 15px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .prize-reward-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.25);
    }
    .prize-reward-icon svg { width: 14px; height: 14px; stroke: #fff; }
    .prize-reward-value {
      font-size: 14.5px;
      font-weight: 800;
      color: #fff;
      flex: 1;
      line-height: 1.3;
    }
    .prize-remaining-pill {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.18);
      color: #fff;
      padding: 4px 9px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.22);
    }
    .prize-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }
    .prize-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--ink);
    }
    .prize-deadline {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      color: #a49f92;
    }
    .prize-deadline svg { width: 12px; height: 12px; stroke: #a49f92; }
    .prize-deadline.urgent { color: var(--accent); }
    .prize-deadline.urgent svg { stroke: var(--accent); }
    .prize-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--ink);
      color: #fff;
      font-size: 12.5px;
      font-weight: 700;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: auto;
      transition: background 0.15s ease;
    }
    .prize-cta svg { width: 13px; height: 13px; stroke: #fff; }
    .prize-cta:hover { background: var(--accent); }

    a:focus-visible, .prize-cta:focus-visible, .sponsor-link-chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .empty-state, .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #a49f92;
    }
    .loading-state { font-family: var(--mono); font-size: 13px; }
    .empty-state svg {
      width: 30px; height: 30px;
      stroke: #cfcabf;
      margin: 0 auto 14px;
      display: block;
    }
    .empty-title { font-size: 14.5px; font-weight: 700; color: #514d45; margin-bottom: 4px; }
    .empty-sub { font-size: 12.5px; }

    .not-found {
      text-align: center;
      padding: 100px 20px;
    }
    .not-found svg {
      width: 36px; height: 36px;
      stroke: #cfcabf;
      margin: 0 auto 18px;
      display: block;
    }
    .not-found h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .not-found p {
      font-size: 13.5px;
      color: #a49f92;
      margin-bottom: 22px;
    }
    .not-found a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--ink);
      padding: 12px 20px;
      border-radius: 11px;
      text-decoration: none;
    }
    .not-found a:hover { background: var(--accent); }

    @media (max-width: 560px) {
      .sponsor-stats { grid-template-columns: 1fr; }
      .sponsor-stat:first-child { border-right: none; border-bottom: 1px solid #ece9e1; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">takıl</a>
    <div class="nav-links">
      <a href="/how-it-works/">Nasıl Çalışır?</a>
      <a href="/prizes/">Ödüller</a>
    </div>
  </nav>

  <div class="wrap" id="wrap">
    <div class="loading-state">Sponsor yükleniyor…</div>
  </div>

  <footer>
    <div class="footer-left">takıl</div>
    <div class="footer-links">
      <a href="/privacy-policy.html">Gizlilik Politikası</a>
      <a href="/terms.html">Kullanım Koşulları</a>
      <a href="mailto:destek@takiltr.com">İletişim</a>
    </div>
    <div class="footer-copy">© 2025–2026 OLMAS Systems · Tüm hakları saklıdır.</div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://dxuhfxjrcofniibqtjjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4dWhmeGpyY29mbmlpYnF0ampuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTU5MTUsImV4cCI6MjA5MjYzMTkxNX0.qyepBC4xN0UR1Xqd9f6UJCKSlmHrzZP0u6blENgI7II';

    const ICONS = {
      gift: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/><path d="M16 8a3 3 0 1 0-3-3 3 3 0 0 0-3 3"/></svg>`,
      coffee: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>`,
      meal: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h0a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
      discount: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 9 6 6"/><circle cx="9.5" cy="9.5" r="0.5"/><circle cx="14.5" cy="14.5" r="0.5"/><path d="M21 12a9 9 0 1 1-9-9 9 8 0 0 1 9 9Z"/></svg>`,
      ticket: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 1 0 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 1 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>`,
      clock: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      arrow: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`,
      back: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
      globe: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20Z"/></svg>`,
      at: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 12v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-5.5 8.28"/></svg>`,
      pin: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
      empty: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/></svg>`,
      search: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
    };

    function iconForRewardType(type) {
      if (!type) return ICONS.gift;
      const t = type.toUpperCase();
      if (t.includes('COFFEE')) return ICONS.coffee;
      if (t.includes('MEAL')) return ICONS.meal;
      if (t.includes('DISCOUNT') || t.includes('COUPON')) return ICONS.discount;
      if (t.includes('TICKET') || t.includes('EVENT')) return ICONS.ticket;
      return ICONS.gift;
    }

    function daysUntil(dateStr) {
      const diff = new Date(dateStr) - new Date();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    // normalizes a bare handle or full url into an https:// link
    function toUrl(value) {
      if (!value) return null;
      const v = value.trim();
      if (/^https?:\/\//i.test(v)) return v;
      return `https://${v.replace(/^@/, '')}`;
    }

    function renderCampaignCard(campaign) {
      const reward      = campaign.rewards[0];
      const rewardLabel = escapeHtml(reward?.reward_value || reward?.reward_type || 'Ödül');
      const maxR        = campaign.max_rewards;
      const claimed     = campaign.claimed_rewards ?? 0;
      const remaining   = maxR != null ? Math.max(maxR - claimed, 0) : null;
      const remainingText = remaining != null ? `${remaining}/${maxR}` : 'Sınırsız';

      let deadlineHtml = '';
      if (campaign.end_at) {
        const days   = daysUntil(campaign.end_at);
        const urgent = days <= 7;
        const label  = days <= 0 ? 'Sona erdi' : days === 1 ? 'Son 1 gün' : days <= 7 ? `Son ${days} gün` : new Date(campaign.end_at).toLocaleDateString('tr-TR');
        deadlineHtml = `<div class="prize-deadline ${urgent ? 'urgent' : ''}">${ICONS.clock}<span>${label}</span></div>`;
      }

      return `
        <div class="prize-card">
          <div class="prize-reward-band">
            <span class="prize-reward-icon">${iconForRewardType(reward?.reward_type)}</span>
            <span class="prize-reward-value">${rewardLabel}</span>
            <span class="prize-remaining-pill">${remainingText}</span>
          </div>
          <div class="prize-body">
            <div class="prize-name">${escapeHtml(campaign.title)}</div>
            ${deadlineHtml}
            <a class="prize-cta" href="https://takiltr.com" target="_blank">Uygulamayı aç ${ICONS.arrow}</a>
          </div>
        </div>`;
    }

    function notFound() {
      document.getElementById('wrap').innerHTML = `
        <div class="not-found">
          ${ICONS.search}
          <h1>Sponsor bulunamadı</h1>
          <p>Bu bağlantı geçersiz olabilir ya da sponsor artık aktif değil.</p>
          <a href="/prizes/">${ICONS.back} Ödüllere dön</a>
        </div>`;
    }

    async function loadSponsor() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const wrap = document.getElementById('wrap');

      if (!id) { notFound(); return; }

      const headers = {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      };

      try {
        const sponsorRes = await fetch(`${SUPABASE_URL}/rest/v1/sponsors?id=eq.${encodeURIComponent(id)}&select=*`, { headers });
        const sponsors = await sponsorRes.json();
        const sponsor = sponsors[0];
        if (!sponsor) { notFound(); return; }

        const [campaignsRes, rulesRes, rewardsRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/campaigns?sponsor_id=eq.${encodeURIComponent(id)}&is_active=eq.true&order=created_at.desc`, { headers }),
          fetch(`${SUPABASE_URL}/rest/v1/campaign_rules?select=*`, { headers }),
          fetch(`${SUPABASE_URL}/rest/v1/campaign_rewards?select=*`, { headers }),
        ]);
        const campaigns = await campaignsRes.json();
        const rules     = await rulesRes.json();
        const rewards   = await rewardsRes.json();

        const enriched = campaigns.map(c => ({
          ...c,
          rules:   rules.find(r => r.campaign_id === c.id)?.rules || {},
          rewards: rewards.filter(r => r.campaign_id === c.id),
        }));

        const totalRemaining = enriched.reduce((sum, c) => {
          if (c.max_rewards == null) return sum;
          return sum + Math.max(c.max_rewards - (c.claimed_rewards ?? 0), 0);
        }, 0);

        const initials = (sponsor.name || '?').substring(0, 2).toUpperCase();
        const medallionInner = sponsor.logo_url
          ? `<img src="${sponsor.logo_url}" alt="${escapeHtml(sponsor.name)}" onerror="this.parentElement.textContent='${initials}'">`
          : initials;

        // optional fields — degrade gracefully if the sponsors table doesn't have them yet
        const links = [];
        if (sponsor.website_url) links.push({ href: toUrl(sponsor.website_url), icon: ICONS.globe, label: 'Web sitesi' });
        if (sponsor.instagram_url || sponsor.instagram) links.push({ href: toUrl(sponsor.instagram_url || sponsor.instagram), icon: ICONS.at, label: 'Instagram' });
        if (sponsor.address) links.push({ href: null, icon: ICONS.pin, label: sponsor.address });

        const linksHtml = links.length ? `
          <div class="sponsor-links">
            ${links.map(l => l.href
              ? `<a class="sponsor-link-chip" href="${l.href}" target="_blank" rel="noopener">${l.icon}${escapeHtml(l.label)}</a>`
              : `<span class="sponsor-link-chip">${l.icon}${escapeHtml(l.label)}</span>`
            ).join('')}
          </div>` : '';

        wrap.innerHTML = `
          <a class="back-link" href="/prizes/">${ICONS.back} Ödüllere dön</a>

          <div class="sponsor-card">
            <div class="sponsor-cover">
              <div class="sponsor-medallion">${medallionInner}</div>
            </div>
            <div class="sponsor-seam"><span class="seam-notch l"></span><span class="seam-notch r"></span></div>
            <div class="sponsor-info">
              <span class="sponsor-tag">takıl sponsoru</span>
              <div class="sponsor-name">${escapeHtml(sponsor.name)}</div>
              ${sponsor.description ? `<p class="sponsor-desc">${escapeHtml(sponsor.description)}</p>` : ''}
              ${linksHtml}
            </div>
            <div class="sponsor-stats">
              <div class="sponsor-stat">
                <span class="sponsor-stat-num">${String(enriched.length).padStart(2, '0')}</span>
                <span class="sponsor-stat-label">Aktif kampanya</span>
              </div>
              <div class="sponsor-stat">
                <span class="sponsor-stat-num">${totalRemaining}</span>
                <span class="sponsor-stat-label">Kalan ödül</span>
              </div>
            </div>
          </div>

          <div class="section-heading">
            <span class="section-title">Aktif kampanyalar</span>
            <span class="section-note">${enriched.length} kampanya</span>
          </div>
          <div class="campaign-grid">
            ${enriched.length
              ? enriched.map(renderCampaignCard).join('')
              : `<div class="empty-state" style="grid-column:1/-1;">${ICONS.empty}<div class="empty-title">Şu an aktif kampanyası yok</div><div class="empty-sub">Yakında yeni kampanyalar eklenebilir.</div></div>`
            }
          </div>
        `;
      } catch (err) {
        console.error(err);
        wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<div class="empty-title">Yüklenemedi</div><div class="empty-sub">Sayfayı yenile, tekrar dene.</div></div>`;
      }
    }

    loadSponsor();
  </script>
</body>
</html>
