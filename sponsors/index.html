<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sponsor — takıl</title>
  <meta name="description" content="takıl'daki kampanya sponsorlarını keşfet." />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../takil.css" />

  <style>
    /* ── Local design tokens (mirrors prizes/index.html for a shared feel) ── */
    :root {
      --accent:      #FF4B1F;
      --accent-2:    #E8380C;
      --accent-3:    #B92B08;
      --accent-soft: rgba(255, 75, 31, 0.08);
      --accent-mid:  rgba(255, 75, 31, 0.18);
      --accent-ring: rgba(255, 75, 31, 0.32);
      --lime:        #d7e5bb;
      --lime-soft:   rgba(215, 229, 187, 0.30);
      --lime-ink:    #4b5a2e;
      --ink:         #16140f;
      --ink-2:       #3a362c;
      --page:        #fdfcf9;
      --card:        #ffffff;
      --line:        #ece9e1;
      --line-soft:   #f3f1eb;
      --muted:       #837e73;
      --muted-2:     #a49f92;
      --faint:       #d8d3c7;
      --mono:        'IBM Plex Mono', ui-monospace, monospace;

      --r-xs: 10px;
      --r-sm: 14px;
      --r-md: 18px;
      --r-lg: 22px;
      --r-xl: 28px;

      --shadow-xs: 0 1px 2px rgba(22,20,15,0.04);
      --shadow-sm: 0 1px 1px rgba(22,20,15,0.04), 0 6px 14px -8px rgba(22,20,15,0.10);
      --shadow-md: 0 2px 4px rgba(22,20,15,0.03), 0 16px 28px -14px rgba(22,20,15,0.14);
      --shadow-lg: 0 4px 8px rgba(22,20,15,0.03), 0 28px 52px -20px rgba(22,20,15,0.20);
      --shadow-accent: 0 6px 12px -4px rgba(255,75,31,0.14), 0 24px 44px -18px rgba(255,75,31,0.34);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: 'Bricolage Grotesque', -apple-system, sans-serif;
      background:
        radial-gradient(1100px 480px at 50% -180px, rgba(255,75,31,0.05), transparent 60%),
        var(--page);
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -420px 0; }
      100% { background-position: 420px 0; }
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: calc(var(--nav-h, 60px) + 44px) 20px 120px;
    }

    /* back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s var(--ease), gap 0.15s var(--ease);
    }
    .back-link:hover { color: var(--accent); gap: 9px; }
    .back-link svg { width: 13px; height: 13px; stroke: currentColor; flex-shrink: 0; }

    /* ── Loading skeleton ── */
    .skel-card {
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow-xs);
      margin-bottom: 44px;
    }
    .skel-cover { height: 132px; background: var(--line-soft); }
    .skel-info { padding: 46px 28px 28px; display: flex; flex-direction: column; gap: 12px; }
    .skel-line {
      height: 12px; border-radius: 6px;
      background: linear-gradient(90deg, var(--line-soft) 25%, #ecebe3 37%, var(--line-soft) 63%);
      background-size: 420px 100%;
      animation: shimmer 1.6s linear infinite;
    }
    .skel-line.w40 { width: 40%; height: 22px; }
    .skel-line.w80 { width: 80%; }
    .skel-line.w60 { width: 60%; }

    /* ── Membership-card hero ── */
    .sponsor-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow-md);
      margin-bottom: 44px;
      animation: riseIn 0.55s var(--ease) both;
    }
    .sponsor-cover {
      position: relative;
      height: 138px;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.16) 1.4px, transparent 1.4px),
        linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 55%, var(--accent-3) 100%);
      background-size: 16px 16px, 100% 100%;
      display: flex;
      align-items: flex-end;
      padding: 0 28px;
    }
    .sponsor-verified {
      position: absolute;
      top: 18px;
      right: 20px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      color: #fff;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 5px 11px 5px 8px;
      border-radius: 100px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .sponsor-verified svg { width: 12px; height: 12px; stroke: #fff; }
    .sponsor-medallion {
      position: absolute;
      left: 28px;
      bottom: -36px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--card);
      border: 4px solid var(--card);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 21px;
      font-weight: 600;
      color: var(--accent);
      z-index: 2;
    }
    .sponsor-medallion img { width: 100%; height: 100%; object-fit: cover; }
    .sponsor-seam {
      position: relative;
      height: 0;
      border-top: 2px dashed rgba(22,20,15,0.13);
    }
    .seam-notch {
      position: absolute;
      top: -9px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--page);
    }
    .seam-notch.l { left: -9px; }
    .seam-notch.r { right: -9px; }

    .sponsor-info { padding: 48px 28px 28px; }
    .sponsor-name {
      font-size: clamp(24px, 4.5vw, 30px);
      font-weight: 800;
      letter-spacing: -0.6px;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.15;
    }
    .sponsor-tag {
      font-family: var(--mono);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--accent-3);
      margin-bottom: 18px;
      display: block;
    }
    .sponsor-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 56ch;
      margin-bottom: 22px;
    }
    .sponsor-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sponsor-link-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--ink);
      background: #fbfaf7;
      border: 1px solid var(--line);
      padding: 8px 14px 8px 8px;
      border-radius: var(--r-xs);
      text-decoration: none;
      transition: border-color 0.18s var(--ease), color 0.18s var(--ease), background 0.18s var(--ease), transform 0.18s var(--ease);
    }
    .sponsor-link-chip:hover {
      border-color: var(--accent-ring);
      color: var(--accent-3);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }
    .sponsor-link-chip .chip-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sponsor-link-chip:hover .chip-icon { background: var(--accent-mid); }
    .sponsor-link-chip svg { width: 12px; height: 12px; stroke: currentColor; }

    /* stat strip */
    .sponsor-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border-top: 1px solid var(--line);
    }
    .sponsor-stat {
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sponsor-stat:first-child { border-right: 1px solid var(--line); }
    .sponsor-stat-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sponsor-stat-icon svg { width: 16px; height: 16px; stroke: var(--accent-3); }
    .sponsor-stat-body { display: flex; flex-direction: column; gap: 2px; }
    .sponsor-stat-num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .sponsor-stat-label { font-size: 11.5px; font-weight: 600; color: var(--muted-2); }

    /* section heading */
    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--ink);
    }
    .section-note {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
    }

    /* reuse of the ticket card, trimmed for this context — visually identical to prizes/index.html */
    .campaign-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      margin-bottom: 52px;
    }
    .prize-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      overflow: hidden;
      background: var(--card);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-xs);
      transition: box-shadow 0.28s var(--ease), transform 0.28s var(--ease), border-color 0.28s var(--ease);
      opacity: 0;
      animation: riseIn 0.5s var(--ease) forwards;
    }
    .prize-card:hover {
      border-color: var(--accent-ring);
      box-shadow: var(--shadow-accent);
      transform: translateY(-3px);
    }
    .prize-reward-band {
      position: relative;
      background:
        radial-gradient(circle at 18% 30%, rgba(255,255,255,0.14) 1.2px, transparent 1.2px),
        linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 55%, var(--accent-3) 100%);
      background-size: 15px 15px, 100% 100%;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .prize-reward-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.25);
    }
    .prize-reward-icon svg { width: 14px; height: 14px; stroke: #fff; }
    .prize-reward-value {
      font-size: 14.5px;
      font-weight: 800;
      color: #fff;
      flex: 1;
      line-height: 1.3;
    }
    .prize-remaining-pill {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.16);
      color: #fff;
      padding: 5px 10px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.24);
    }
    .prize-remaining-pill.soldout {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      border-color: rgba(255,255,255,0.15);
    }
    .prize-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
      flex: 1;
    }
    .prize-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--ink);
      line-height: 1.25;
    }
    .prize-deadline {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-2);
      background: var(--line-soft);
      border: 1px solid var(--line);
      padding: 6px 10px 6px 9px;
      border-radius: 100px;
    }
    .prize-deadline svg { width: 12px; height: 12px; stroke: var(--muted-2); }
    .prize-deadline.urgent {
      color: var(--accent-3);
      background: var(--accent-soft);
      border-color: var(--accent-mid);
    }
    .prize-deadline.urgent svg { stroke: var(--accent); }
    .prize-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--ink);
      color: #fff;
      font-size: 12.5px;
      font-weight: 700;
      padding: 12px;
      border-radius: var(--r-xs);
      text-decoration: none;
      margin-top: auto;
      transition: background 0.18s var(--ease), transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    .prize-cta svg { width: 13px; height: 13px; stroke: #fff; transition: transform 0.15s var(--ease); }
    .prize-cta:hover {
      background: var(--accent);
      box-shadow: 0 8px 18px -8px rgba(255,75,31,0.5);
      transform: translateY(-1px);
    }
    .prize-cta:hover svg { transform: translateX(2px); }

    a:focus-visible, .prize-cta:focus-visible, .sponsor-link-chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted-2);
      border: 1px dashed var(--line);
      border-radius: var(--r-lg);
      background: var(--card);
    }
    .empty-state svg { width: 28px; height: 28px; stroke: var(--faint); margin: 0 auto 14px; display: block; }
    .empty-title { font-size: 14.5px; font-weight: 700; color: var(--ink-2); margin-bottom: 4px; }
    .empty-sub { font-size: 12.5px; }

    .not-found {
      text-align: center;
      padding: 110px 20px;
      animation: riseIn 0.5s var(--ease) both;
    }
    .not-found svg { width: 36px; height: 36px; stroke: var(--faint); margin: 0 auto 18px; display: block; }
    .not-found h1 { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.4px; }
    .not-found p { font-size: 13.5px; color: var(--muted-2); margin-bottom: 24px; }
    .not-found a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--ink);
      padding: 12px 20px;
      border-radius: var(--r-xs);
      text-decoration: none;
      transition: background 0.18s var(--ease);
    }
    .not-found a:hover { background: var(--accent); }

    @media (max-width: 560px) {
      .sponsor-stats { grid-template-columns: 1fr; }
      .sponsor-stat:first-child { border-right: none; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>

      at: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 12v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-5.5 8.28"/></svg>`,
      pin: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`,
      empty: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/></svg>`,
      search: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
      megaphone: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>`,
      award: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.5 13.5 17 22l-5-3-5 3 1.5-8.5"/></svg>`,
      badgeCheck: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 1.6 2.8-.4 1.2 2.6 2.6 1.2-.4 2.8L22 12l-1.6 2.4.4 2.8-2.6 1.2-1.2 2.6-2.8-.4L12 22l-2.4-1.6-2.8.4-1.2-2.6-2.6-1.2.4-2.8L2 12l1.6-2.4-.4-2.8 2.6-1.2 1.2-2.6 2.8.4L12 2z"/><path d="m9 12 2 2 4-4"/></svg>`,
    };

    function iconForRewardType(type) {
      if (!type) return ICONS.gift;
      const t = type.toUpperCase();
      if (t.includes('COFFEE')) return ICONS.coffee;
      if (t.includes('MEAL')) return ICONS.meal;
      if (t.includes('DISCOUNT') || t.includes('COUPON')) return ICONS.discount;
      if (t.includes('TICKET') || t.includes('EVENT')) return ICONS.ticket;
      return ICONS.gift;
    }

    function daysUntil(dateStr) {
      const diff = new Date(dateStr) - new Date();
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    // normalizes a bare handle or full url into an https:// link
    function toUrl(value) {
      if (!value) return null;
      const v = value.trim();
      if (/^https?:\/\//i.test(v)) return v;
      return `https://${v.replace(/^@/, '')}`;
    }

    function renderCampaignCard(campaign, index) {
      const reward      = campaign.rewards[0];
      const rewardLabel = escapeHtml(reward?.reward_value || reward?.reward_type || 'Ödül');
      const maxR        = campaign.max_rewards;
      const claimed     = campaign.claimed_rewards ?? 0;
      const remaining   = maxR != null ? Math.max(maxR - claimed, 0) : null;
      const isSoldOut   = remaining === 0;
      const remainingText = remaining == null ? 'Sınırsız' : isSoldOut ? 'Tükendi' : `${remaining}/${maxR}`;

      let deadlineHtml = '';
      if (campaign.end_at) {
        const days   = daysUntil(campaign.end_at);
        const urgent = days <= 7;
        const label  = days <= 0 ? 'Sona erdi' : days === 1 ? 'Son 1 gün' : days <= 7 ? `Son ${days} gün` : new Date(campaign.end_at).toLocaleDateString('tr-TR');
        deadlineHtml = `<div class="prize-deadline ${urgent ? 'urgent' : ''}">${ICONS.clock}<span>${label}</span></div>`;
      }

      return `
        <div class="prize-card" style="animation-delay:${Math.min(index, 8) * 55}ms">
          <div class="prize-reward-band">
            <span class="prize-reward-icon">${iconForRewardType(reward?.reward_type)}</span>
            <span class="prize-reward-value">${rewardLabel}</span>
            <span class="prize-remaining-pill ${isSoldOut ? 'soldout' : ''}">${remainingText}</span>
          </div>
          <div class="prize-body">
            <div class="prize-name">${escapeHtml(campaign.title)}</div>
            ${deadlineHtml}
            <a class="prize-cta" href="https://takiltr.com" target="_blank">Uygulamayı aç ${ICONS.arrow}</a>
          </div>
        </div>`;
    }

    function notFound() {
      document.getElementById('wrap').innerHTML = `
        <div class="not-found">
          ${ICONS.search}
          <h1>Sponsor bulunamadı</h1>
          <p>Bu bağlantı geçersiz olabilir ya da sponsor artık aktif değil.</p>
          <a href="/prizes/">${ICONS.back} Ödüllere dön</a>
        </div>`;
    }

    async function loadSponsor() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const wrap = document.getElementById('wrap');

      if (!id) { notFound(); return; }

      const headers = {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      };

      try {
        const sponsorRes = await fetch(`${SUPABASE_URL}/rest/v1/sponsors?id=eq.${encodeURIComponent(id)}&select=*`, { headers });
        const sponsors = await sponsorRes.json();
        const sponsor = sponsors[0];
        if (!sponsor) { notFound(); return; }

        const [campaignsRes, rewardsRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/campaigns?sponsor_id=eq.${encodeURIComponent(id)}&is_active=eq.true&order=created_at.desc`, { headers }),
          fetch(`${SUPABASE_URL}/rest/v1/campaign_rewards?select=*`, { headers }),
        ]);
        const campaigns = await campaignsRes.json();
        const rewards   = await rewardsRes.json();

        const enriched = campaigns.map(c => ({
          ...c,
          rewards: rewards.filter(r => r.campaign_id === c.id),
        }));

        const totalRemaining = enriched.reduce((sum, c) => {
          if (c.max_rewards == null) return sum;
          return sum + Math.max(c.max_rewards - (c.claimed_rewards ?? 0), 0);
        }, 0);

        const initials = (sponsor.name || '?').substring(0, 2).toUpperCase();
        const medallionInner = sponsor.logo_url
          ? `<img src="${sponsor.logo_url}" alt="${escapeHtml(sponsor.name)}" onerror="this.parentElement.textContent='${initials}'">`
          : initials;

        // optional fields — degrade gracefully if the sponsors table doesn't have them yet
        const links = [];
        if (sponsor.website_url) links.push({ href: toUrl(sponsor.website_url), icon: ICONS.globe, label: 'Web sitesi' });
        if (sponsor.instagram_url || sponsor.instagram) links.push({ href: toUrl(sponsor.instagram_url || sponsor.instagram), icon: ICONS.at, label: 'Instagram' });
        if (sponsor.address) links.push({ href: null, icon: ICONS.pin, label: sponsor.address });

        const linksHtml = links.length ? `
          <div class="sponsor-links">
            ${links.map(l => l.href
              ? `<a class="sponsor-link-chip" href="${l.href}" target="_blank" rel="noopener"><span class="chip-icon">${l.icon}</span>${escapeHtml(l.label)}</a>`
              : `<span class="sponsor-link-chip"><span class="chip-icon">${l.icon}</span>${escapeHtml(l.label)}</span>`
            ).join('')}
          </div>` : '';

        wrap.innerHTML = `
          <a class="back-link" href="/prizes/">${ICONS.back} Ödüllere dön</a>

          <div class="sponsor-card">
            <div class="sponsor-cover">
              <span class="sponsor-verified">${ICONS.badgeCheck} Doğrulanmış</span>
              <div class="sponsor-medallion">${medallionInner}</div>
            </div>
            <div class="sponsor-seam"><span class="seam-notch l"></span><span class="seam-notch r"></span></div>
            <div class="sponsor-info">
              <span class="sponsor-tag">takıl sponsoru</span>
              <div class="sponsor-name">${escapeHtml(sponsor.name)}</div>
              ${sponsor.description ? `<p class="sponsor-desc">${escapeHtml(sponsor.description)}</p>` : ''}
              ${linksHtml}
            </div>
            <div class="sponsor-stats">
              <div class="sponsor-stat">
                <span class="sponsor-stat-icon">${ICONS.megaphone}</span>
                <span class="sponsor-stat-body">
                  <span class="sponsor-stat-num">${String(enriched.length).padStart(2, '0')}</span>
                  <span class="sponsor-stat-label">Aktif kampanya</span>
                </span>
              </div>
              <div class="sponsor-stat">
                <span class="sponsor-stat-icon">${ICONS.award}</span>
                <span class="sponsor-stat-body">
                  <span class="sponsor-stat-num">${totalRemaining}</span>
                  <span class="sponsor-stat-label">Kalan ödül</span>
                </span>
              </div>
            </div>
          </div>

          <div class="section-heading">
            <span class="section-title">Aktif kampanyalar</span>
            <span class="section-note">${enriched.length} kampanya</span>
          </div>
          <div class="campaign-grid">
            ${enriched.length
              ? enriched.map(renderCampaignCard).join('')
              : `<div class="empty-state" style="grid-column:1/-1;">${ICONS.empty}<div class="empty-title">Şu an aktif kampanyası yok</div><div class="empty-sub">Yakında yeni kampanyalar eklenebilir.</div></div>`
            }
          </div>
        `;
      } catch (err) {
        console.error(err);
        wrap.innerHTML = `<div class="empty-state">${ICONS.empty}<div class="empty-title">Yüklenemedi</div><div class="empty-sub">Sayfayı yenile, tekrar dene.</div></div>`;
      }
    }

    loadSponsor();

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });
    function closeMenu() {
      mobileMenu.classList.remove('open');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) closeMenu();
    });
  </script>
</body>
</html>
